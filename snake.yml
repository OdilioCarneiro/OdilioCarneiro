name: generate animated snake

on:
  schedule:
    - cron: "0 0 * * *" # roda uma vez por dia
  workflow_dispatch: {} # permite rodar manualmente na aba Actions
  push:
    branches:
      - main # gera assim que você atualizar o README na branch principal

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: gera o svg da snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: publica na branch "output"
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
