<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120805"/>
      <stop offset="30%" stop-color="#341709"/>
      <stop offset="55%" stop-color="#7a3714"/>
      <stop offset="78%" stop-color="#d1732a"/>
      <stop offset="100%" stop-color="#f3a94a"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="45%" stop-color="#ffcf6b"/>
      <stop offset="100%" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffedb8"/>
      <stop offset="50%" stop-color="#ffcc5c"/>
      <stop offset="100%" stop-color="#dd8a2e"/>
    </linearGradient>
    <linearGradient id="dune1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaa84c"/>
      <stop offset="100%" stop-color="#c17817"/>
    </linearGradient>
    <linearGradient id="dune2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c17817"/>
      <stop offset="100%" stop-color="#8a4a10"/>
    </linearGradient>
    <linearGradient id="dune3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a3d0d"/>
      <stop offset="100%" stop-color="#40200a"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <style>
    @keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:1} }
    @keyframes pulseSun { 0%,100%{opacity:.7; transform:scale(1)} 50%{opacity:1; transform:scale(1.1)} }
    @keyframes driftSlow { from{transform:translateX(0)} to{transform:translateX(-1200px)} }
    @keyframes driftMid  { from{transform:translateX(0)} to{transform:translateX(-1200px)} }
    @keyframes driftFast { from{transform:translateX(0)} to{transform:translateX(-1200px)} }
    @keyframes rise { 0%{transform:translateY(0); opacity:0} 12%{opacity:1} 85%{opacity:1} 100%{transform:translateY(-230px); opacity:0} }
    @keyframes ripple { 0%{transform:scale(.25); opacity:0} 35%{opacity:.55} 100%{transform:scale(1.7); opacity:0} }
    @keyframes glowPulse { 0%,100%{opacity:.55} 50%{opacity:1} }
    @keyframes fadeSlideIn { from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)} }
    @keyframes shimmer { 0%{stroke-dashoffset:400} 100%{stroke-dashoffset:0} }

    .star{animation:twinkle 3s ease-in-out infinite}
    .sun{animation:pulseSun 5s ease-in-out infinite; transform-box:fill-box; transform-origin:center}
    .layer-far{animation:driftSlow 75s linear infinite}
    .layer-mid{animation:driftMid 46s linear infinite}
    .layer-near{animation:driftFast 26s linear infinite}
    .particle{animation:rise 6s linear infinite}
    .ripple{animation:ripple 4s ease-out infinite; transform-box:fill-box; transform-origin:center}
    .glowtext{animation:glowPulse 3.5s ease-in-out infinite}
    .fadein{animation:fadeSlideIn 1.3s ease-out forwards; opacity:0}
    .trail{animation:shimmer 3s linear infinite}
  </style>

  <rect width="1200" height="300" fill="url(#sky)"/>

  <!-- estrelas -->
  <g fill="#fff8e1">
    <circle class="star" cx="70" cy="35" r="1.6" style="animation-delay:0s"/>
    <circle class="star" cx="160" cy="60" r="1.2" style="animation-delay:.6s"/>
    <circle class="star" cx="260" cy="30" r="1.5" style="animation-delay:1.2s"/>
    <circle class="star" cx="980" cy="40" r="1.4" style="animation-delay:.3s"/>
    <circle class="star" cx="1080" cy="70" r="1.7" style="animation-delay:1.6s"/>
    <circle class="star" cx="1150" cy="35" r="1.2" style="animation-delay:2.1s"/>
    <circle class="star" cx="900" cy="25" r="1.3" style="animation-delay:.9s"/>
    <circle class="star" cx="340" cy="55" r="1.1" style="animation-delay:1.8s"/>
  </g>

  <!-- sol -->
  <circle class="sun" cx="600" cy="128" r="55" fill="url(#sunGrad)" filter="url(#glow)"/>
  <circle cx="600" cy="128" r="28" fill="#ffedb0" opacity="0.9"/>

  <!-- dunas (parallax, cada grupo tem a forma duplicada para loop perfeito) -->
  <g class="layer-far">
    <path d="M0,210 Q150,180 300,195 T600,185 T900,205 T1200,190 L1200,300 L0,300 Z" fill="url(#dune1)"/>
    <path d="M1200,210 Q1350,180 1500,195 T1800,185 T2100,205 T2400,190 L2400,300 L1200,300 Z" fill="url(#dune1)"/>
  </g>
  <g class="layer-mid">
    <path d="M0,240 Q200,212 400,230 T800,224 T1200,235 L1200,300 L0,300 Z" fill="url(#dune2)"/>
    <path d="M1200,240 Q1400,212 1600,230 T2000,224 T2400,235 L2400,300 L1200,300 Z" fill="url(#dune2)"/>
  </g>
  <g class="layer-near">
    <path d="M0,272 Q250,252 500,266 T1000,260 T1200,268 L1200,300 L0,300 Z" fill="url(#dune3)"/>
    <path d="M1200,272 Q1450,252 1700,266 T2200,260 T2400,268 L2400,300 L1200,300 Z" fill="url(#dune3)"/>
  </g>

  <!-- sinal do verme de areia -->
  <circle class="ripple" cx="1010" cy="262" r="10" fill="none" stroke="#3a1c08" stroke-width="2"/>
  <circle class="ripple" cx="1010" cy="262" r="10" fill="none" stroke="#3a1c08" stroke-width="2" style="animation-delay:1.3s"/>
  <circle class="ripple" cx="1010" cy="262" r="10" fill="none" stroke="#3a1c08" stroke-width="2" style="animation-delay:2.6s"/>

  <!-- particulas de areia -->
  <g fill="#ffe6a8">
    <circle class="particle" cx="140" cy="280" r="2" style="animation-delay:0s"/>
    <circle class="particle" cx="260" cy="285" r="1.6" style="animation-delay:1.4s"/>
    <circle class="particle" cx="950" cy="278" r="2.2" style="animation-delay:.7s"/>
    <circle class="particle" cx="1060" cy="282" r="1.4" style="animation-delay:2.2s"/>
    <circle class="particle" cx="620" cy="288" r="1.8" style="animation-delay:3.1s"/>
    <circle class="particle" cx="80" cy="290" r="1.5" style="animation-delay:4s"/>
  </g>

  <!-- titulo -->
  <text x="600" y="140" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" letter-spacing="9" fill="url(#goldText)" filter="url(#glow)" class="glowtext" font-weight="bold">ODÍLIO CARNEIRO</text>

  <!-- subtitulo -->
  <text x="600" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="19" fill="#f5deb3" class="fadein" style="animation-delay:.35s">IT Technician Student · IFCE Fortaleza</text>

  <text x="600" y="207" text-anchor="middle" font-family="Georgia, serif" font-size="14" letter-spacing="2.5" fill="#e0b070" class="fadein" style="animation-delay:.85s">PYTHON · JAVASCRIPT · JAVA · SWIFT</text>

  <!-- linha de especiaria -->
  <line x1="0" y1="293" x2="1200" y2="293" stroke="#ffcf6b" stroke-width="1.5" stroke-dasharray="6 9" class="trail" opacity="0.55"/>
</svg>
