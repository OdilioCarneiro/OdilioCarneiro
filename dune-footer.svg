<svg viewBox="0 0 1200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0508"/>
      <stop offset="55%" stop-color="#1c0f14"/>
      <stop offset="100%" stop-color="#3a1c10"/>
    </linearGradient>
    <linearGradient id="goldText2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffedb8"/>
      <stop offset="50%" stop-color="#ffcc5c"/>
      <stop offset="100%" stop-color="#dd8a2e"/>
    </linearGradient>
    <linearGradient id="duneFooter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a2f10"/>
      <stop offset="100%" stop-color="#2c1608"/>
    </linearGradient>
    <filter id="glowFooter" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes twinkle2 { 0%,100%{opacity:.15} 50%{opacity:1} }
    @keyframes shoot {
      0%{transform:translate(0,0); opacity:0}
      5%{opacity:1}
      20%{transform:translate(260px,90px); opacity:0}
      100%{transform:translate(260px,90px); opacity:0}
    }
    @keyframes glowPulse2 { 0%,100%{opacity:.55} 50%{opacity:1} }
    @keyframes driftFooter { from{transform:translateX(0)} to{transform:translateX(-1200px)} }

    .star2{animation:twinkle2 3.2s ease-in-out infinite}
    .shootingstar{animation:shoot 7s ease-in infinite}
    .glowtext2{animation:glowPulse2 3.5s ease-in-out infinite}
    .dunes-footer{animation:driftFooter 60s linear infinite}
  </style>

  <rect width="1200" height="150" fill="url(#nightSky)"/>

  <g fill="#fff8e1">
    <circle class="star2" cx="60" cy="20" r="1.3" style="animation-delay:0s"/>
    <circle class="star2" cx="140" cy="45" r="1" style="animation-delay:.5s"/>
    <circle class="star2" cx="230" cy="15" r="1.4" style="animation-delay:1s"/>
    <circle class="star2" cx="980" cy="25" r="1.2" style="animation-delay:.3s"/>
    <circle class="star2" cx="1070" cy="50" r="1.5" style="animation-delay:1.4s"/>
    <circle class="star2" cx="1140" cy="18" r="1" style="animation-delay:2s"/>
    <circle class="star2" cx="400" cy="30" r="1.1" style="animation-delay:1.7s"/>
    <circle class="star2" cx="850" cy="18" r="1.2" style="animation-delay:2.4s"/>
    <circle class="star2" cx="550" cy="22" r="1" style="animation-delay:.8s"/>
  </g>

  <!-- estrela cadente -->
  <g class="shootingstar">
    <line x1="80" y1="10" x2="30" y2="0" stroke="#ffe9b3" stroke-width="2" opacity="0.9"/>
    <circle cx="80" cy="10" r="2" fill="#fff3c4"/>
  </g>

  <!-- dunas do rodape -->
  <g class="dunes-footer">
    <path d="M0,120 Q200,100 400,115 T800,110 T1200,118 L1200,150 L0,150 Z" fill="url(#duneFooter)"/>
    <path d="M1200,120 Q1400,100 1600,115 T2000,110 T2400,118 L2400,150 L1200,150 Z" fill="url(#duneFooter)"/>
  </g>

  <text x="600" y="70" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" letter-spacing="3" fill="url(#goldText2)" filter="url(#glowFooter)" class="glowtext2" font-weight="bold">Obrigado pela visita</text>

  <text x="600" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="13" letter-spacing="1" fill="#c9a878" opacity="0.85">que seus caminhos encontrem sempre água e sombra</text>
</svg>
